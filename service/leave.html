<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>休假表｜OMNIPLAY 客服系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <section class="app-shell" aria-label="客服系統主畫面">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-mark">OP</span><span class="label">CSR Support</span></div>
        <button class="toggle-btn" id="sidebarToggle" type="button" aria-label="收合左側功能表">☰</button>
      </div>
      <nav class="menu" aria-label="主功能表">
        <a class="home-link" href="../index.html"><span class="icon">🏠</span><span class="label">首頁</span></a>
        <section class="menu-section">
          <button class="section-button is-open" type="button"><span class="section-title"><span class="icon">👥</span><span class="label">客服內部</span></span><span class="chevron">›</span></button>
          <ul class="submenu is-open">
            <li><a class="" href="../service/staff.html">人員管理</a></li>
            <li><a class="is-active" href="../service/leave.html">休假表</a></li>
            <li><a class="" href="../service/schedule.html">排程表</a></li>
            <li><a class="" href="../service/kpi.html">KPI</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">🗂️</span><span class="label">作業管理</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../work/log.html">日誌</a></li>
            <li><a class="" href="../work/handover.html">交接</a></li>
            <li><a class="" href="../work/report.html">提報</a></li>
            <li><a class="" href="../work/tracking.html">對接追蹤</a></li>
            <li><a class="" href="../work/alert.html">PROD告警紀錄</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">📝</span><span class="label">會議歷程</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../meeting/meeting.html">會議紀錄</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">🧠</span><span class="label">資料庫</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../resource/knowledge.html">知識庫</a></li>
            <li><a class="" href="../resource/ai-database.html">AI 資料庫</a></li>
          </ul>
        </section>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>休假表</h1>
          <p>客服團隊休假資訊維護。</p>
        </div>
        <div class="user-pill">● 已連線 Firebase</div>
      </header>
      <section class="leave-panel" aria-label="休假表">
        <div class="panel-heading leave-heading">
         <div class="leave-toolbar" aria-label="月份切換與特殊標記">
            <button class="secondary-button" id="prevLeaveMonth" type="button">← 上個月</button>
            <strong id="leaveMonthLabel">—</strong>
            <button class="secondary-button" id="nextLeaveMonth" type="button">下個月 →</button>
            <button class="ghost-button" id="todayLeaveMonth" type="button">本月</button>
            <label class="global-quota-field" for="globalLeaveQuota">可休：<input id="globalLeaveQuota" data-action="quota" type="number" min="0" max="31" step="1" value="8" aria-label="當月全員可休天數" /></label>
          </div>
        </div>

        <div class="leave-meta">
          <p id="leaveLegend" class="leave-legend"><span class="leave-marker">▲</span> 休假　<span class="leave-marker is-required">▲</span> 必休　<button class="leave-legend-button special-mode-button" id="phoneSpecialMode" type="button" data-special="phone" aria-pressed="false">📱 值公務機</button>　<button class="leave-legend-button special-mode-button" id="eventSpecialMode" type="button" data-special="event" aria-pressed="false">🎰 公司活動</button></p>
          <p class="leave-status" id="leaveStatus" data-type="info" hidden></p>
        </div>

        <div class="leave-table-wrap" aria-label="可左右滑動的休假表">
          <table class="leave-table" id="leaveTable">
            <thead id="leaveTableHead"></thead>
            <tbody id="leaveTableBody"></tbody>
          </table>
        </div>
      </section>
      
    </main>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../assets/firebase-init.js"></script>
  <script src="../assets/app.js"></script>
  <script src="../assets/leave.js"></script>
</body>
</html>
