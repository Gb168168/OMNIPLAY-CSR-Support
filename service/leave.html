<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>休假表｜OMNIPLAY 客服系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="manifest" href="/OMNIPLAY-CSR-Support/manifest.json" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
</head>
<body>
  <section class="app-shell" aria-label="客服系統主畫面">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-mark">OP</span><span class="label">CSR<br />Support</span></div>
        <button class="toggle-btn mobile-menu-btn" id="sidebarToggle" type="button" aria-label="收合左側功能表">☰</button>
      </div>
      <nav class="menu" aria-label="主功能表">
        <a class="home-link" href="../index.html"><span class="icon">🏠</span><span class="label">首頁</span></a>
        
        <section class="sidebar-group" aria-labelledby="serviceGroupTitle">
          <h2 class="sidebar-group-title" id="serviceGroupTitle"><span class="icon">👥</span><span class="label">客服內部</span></h2>
          <a class="sidebar-sub-item" href="../service/staff.html"><span class="bullet">•</span><span class="icon">👤</span><span class="label">人員管理</span></a>
          <a class="sidebar-sub-item is-active" href="../service/leave.html"><span class="bullet">•</span><span class="icon">🌴</span><span class="label">休假表</span></a>
          <a class="sidebar-sub-item" href="../service/schedule.html"><span class="bullet">•</span><span class="icon">📅</span><span class="label">排程表</span></a>
          <a class="sidebar-sub-item" href="../service/kpi.html"><span class="bullet">•</span><span class="icon">📊</span><span class="label">KPI</span></a>
        </section>
        
        <section class="sidebar-group" aria-labelledby="workGroupTitle">
          <h2 class="sidebar-group-title" id="workGroupTitle"><span class="icon">🗂️</span><span class="label">作業管理</span></h2>
          <a class="sidebar-sub-item" href="../work/log.html"><span class="bullet">•</span><span class="icon">📒</span><span class="label">日誌</span></a>
          <a class="sidebar-sub-item" href="../work/handover.html"><span class="bullet">•</span><span class="icon">🤝</span><span class="label">交接</span></a>
          <a class="sidebar-sub-item" href="../work/report.html"><span class="bullet">•</span><span class="icon">📣</span><span class="label">提報</span></a>
          <a class="sidebar-sub-item" href="../work/tracking.html"><span class="bullet">•</span><span class="icon">🔎</span><span class="label">對接追蹤</span></a>
          <a class="sidebar-sub-item" href="../work/alert.html"><span class="bullet">•</span><span class="icon">🚨</span><span class="label">PROD告警紀錄</span></a>
        </section>
        
        <section class="sidebar-group" aria-labelledby="meetingGroupTitle">
          <h2 class="sidebar-group-title" id="meetingGroupTitle"><span class="icon">📝</span><span class="label">會議歷程</span></h2>
          <a class="sidebar-sub-item" href="../meeting/meeting.html"><span class="bullet">•</span><span class="icon">📝</span><span class="label">會議紀錄</span></a>
        </section>
        
        <section class="sidebar-group" aria-labelledby="resourceGroupTitle">
          <h2 class="sidebar-group-title" id="resourceGroupTitle"><span class="icon">🧠</span><span class="label">資料庫</span></h2>
          <a class="sidebar-sub-item" href="../resource/knowledge.html"><span class="bullet">•</span><span class="icon">📚</span><span class="label">知識庫</span></a>
          <a class="sidebar-sub-item" href="../resource/ai-database.html"><span class="bullet">•</span><span class="icon">🤖</span><span class="label">AI 資料庫</span></a>
        </section>
      </nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>休假表</h1>
          <p>客服團隊休假資訊維護。</p>
        </div>
        <div class="user-pill">● 已連線 Firebase</div>
      </header>
      <section class="leave-panel" aria-label="休假表">
        <div class="panel-heading leave-heading">
         <div class="leave-toolbar" aria-label="月份切換與特殊標記">
            <button class="secondary-button" id="prevLeaveMonth" type="button">← 上個月</button>
            <strong id="leaveMonthLabel">—</strong>
            <button class="secondary-button" id="nextLeaveMonth" type="button">下個月 →</button>
            <button class="ghost-button" id="todayLeaveMonth" type="button">本月</button>
            <label class="global-quota-field" for="globalLeaveQuota">可休：<input id="globalLeaveQuota" data-action="quota" type="number" min="0" max="31" step="1" value="8" aria-label="當月全員可休天數" /></label>
          </div>
        </div>

        <div class="leave-meta">
          <p id="leaveLegend" class="leave-legend"><span class="leave-marker">▲</span> 休假　<span class="leave-marker is-required">▲</span> 必休　<button class="leave-legend-button special-mode-button" id="phoneSpecialMode" type="button" data-special="phone" aria-pressed="false">📱 值公務機</button>　<button class="leave-legend-button special-mode-button" id="eventSpecialMode" type="button" data-special="event" aria-pressed="false">🎰 公司活動</button></p>
          <p class="leave-status" id="leaveStatus" data-type="info" hidden></p>
        </div>

        <div class="leave-table-wrap" aria-label="可左右滑動的休假表">
          <table class="leave-table" id="leaveTable">
            <thead id="leaveTableHead"></thead>
            <tbody id="leaveTableBody"></tbody>
          </table>
        </div>
      </section>
      
    </main>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../assets/firebase-init.js"></script>
  <script src="../assets/app.js"></script>
  <script src="../assets/leave.js"></script>
</body>
</html>
