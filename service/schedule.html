<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>排程表｜OMNIPLAY 客服系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <section class="app-shell" aria-label="客服系統主畫面">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-mark">OP</span><span class="label">CSR Support</span></div>
        <button class="toggle-btn" id="sidebarToggle" type="button" aria-label="收合左側功能表">☰</button>
      </div>
      <nav class="menu" aria-label="主功能表">
        <a class="home-link" href="../index.html"><span class="icon">🏠</span><span class="label">首頁</span></a>
        <section class="menu-section">
          <button class="section-button is-open" type="button"><span class="section-title"><span class="icon">👥</span><span class="label">客服內部</span></span><span class="chevron">›</span></button>
          <ul class="submenu is-open">
            <li><a class="" href="../service/staff.html">人員管理</a></li>
            <li><a class="" href="../service/leave.html">休假表</a></li>
            <li><a class="is-active" href="../service/schedule.html">排程表</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">🗂️</span><span class="label">作業管理</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../work/log.html">日誌</a></li>
            <li><a class="" href="../work/handover.html">交接</a></li>
            <li><a class="" href="../work/report.html">提報</a></li>
            <li><a class="" href="../work/tracking.html">對接追蹤</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">📝</span><span class="label">會議歷程</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../meeting/meeting.html">會議紀錄</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">🧠</span><span class="label">資料庫</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../resource/knowledge.html">知識庫</a></li>
            <li><a class="" href="../resource/ai-database.html">AI 資料庫</a></li>
          </ul>
        </section>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>排程表</h1>
          <p>客服值班與班表排程維護。</p>
        </div>
        <div class="user-pill">● 已連線 Firebase</div>
      </header>
      <section class="schedule-panel" aria-label="排程表月曆">
        <div class="panel-heading schedule-heading">
          <div>
            <h2>排程月曆</h2>
            <p>點擊日期可新增排程；點擊排程可編輯，資料自動連動 Firestore schedule collection。</p>
          </div>
          <div class="schedule-toolbar" aria-label="排程工具列">
            <button class="secondary-button" id="prevSchedulePeriod" type="button">上個月</button>
            <strong id="schedulePeriodLabel">—</strong>
            <button class="secondary-button" id="nextSchedulePeriod" type="button">下個月</button>
            <button class="ghost-button" id="todaySchedulePeriod" type="button">今天</button>
            <div class="view-switch" aria-label="檢視切換">
              <button class="ghost-button is-active" id="monthViewButton" type="button" data-view="month">月</button>
              <button class="ghost-button" id="weekViewButton" type="button" data-view="week">週</button>
            </div>
            <button class="secondary-button schedule-special-trigger" id="phoneDutyButton" type="button" title="顯示所選日期值公務機人員">📱</button>
            <button class="secondary-button schedule-special-trigger" id="companyEventButton" type="button" title="顯示所選日期公司活動人員">🎰</button>
          </div>
        </div>
        <div class="schedule-meta">
          <p id="scheduleHint">選取日期：<strong id="selectedScheduleDate">—</strong>。週日紅字、週六綠字，今天以綠色圓圈標示。</p>
          <p class="schedule-status" id="scheduleStatus" data-type="info">載入資料中...</p>
        </div>
        <div class="calendar-grid" id="scheduleCalendar" aria-label="排程月曆"></div>
      </section>
      
      <div class="modal-backdrop" id="scheduleModal" aria-hidden="true">
        <section class="modal-card schedule-modal-card" role="dialog" aria-modal="true" aria-labelledby="scheduleModalTitle">
          <div class="modal-heading">
            <h2 id="scheduleModalTitle">新增排程</h2>
            <button class="icon-button" id="closeScheduleModal" type="button" aria-label="關閉排程表單">✕</button>
          </div>
          <form class="schedule-form" id="scheduleForm">
            <label><span>標籤顏色</span><select id="scheduleLabelColor" required></select></label>
            <label><span>標籤名稱</span><input id="scheduleLabelName" type="text" placeholder="例如：例會、活動、維護" /></label>
            <label><span>標題</span><input id="scheduleTitle" type="text" required autocomplete="off" /></label>
            <label><span>內容</span><textarea id="scheduleContent" rows="4" placeholder="輸入排程內容"></textarea></label>
            <label><span>提醒時間</span><input id="scheduleReminderAt" type="datetime-local" required /></label>
            <label><span>設置人員</span><select id="scheduleStaff" multiple size="6"></select><small>按住 Ctrl / Command 可多選人員。</small></label>
            <p class="form-message" id="scheduleFormMessage" hidden></p>
            <div class="form-actions">
              <button class="danger-button" id="deleteScheduleButton" type="button">刪除</button>
              <button class="ghost-button" id="cancelScheduleButton" type="button">取消</button>
              <button class="primary-button" id="saveScheduleButton" type="submit">儲存</button>
            </div>
          </form>
        </section>
      </div>

      <div class="schedule-tooltip" id="scheduleSpecialTooltip" hidden></div>
    </main>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../assets/firebase-init.js"></script>
  <script src="../assets/app.js"></script>
  <script src="../assets/schedule.js"></script>
</body>
</html>
