<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>會議紀錄｜OMNIPLAY 客服系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <section class="app-shell" aria-label="客服系統主畫面">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-mark">OP</span><span class="label">CSR Support</span></div>
        <button class="toggle-btn" id="sidebarToggle" type="button" aria-label="收合左側功能表">☰</button>
      </div>
      <nav class="menu" aria-label="主功能表">
        <a class="home-link" href="../index.html"><span class="icon">🏠</span><span class="label">首頁</span></a>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">👥</span><span class="label">客服內部</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../service/staff.html">人員管理</a></li>
            <li><a class="" href="../service/leave.html">休假表</a></li>
            <li><a class="" href="../service/schedule.html">排程表</a></li>
            <li><a class="" href="../service/kpi.html">KPI</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">🗂️</span><span class="label">作業管理</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../work/log.html">日誌</a></li>
            <li><a class="" href="../work/handover.html">交接</a></li>
            <li><a class="" href="../work/report.html">提報</a></li>
            <li><a class="" href="../work/tracking.html">對接追蹤</a></li>
            <li><a class="" href="work/alert.html">PROD告警紀錄</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button is-open" type="button"><span class="section-title"><span class="icon">📝</span><span class="label">會議歷程</span></span><span class="chevron">›</span></button>
          <ul class="submenu is-open">
            <li><a class="is-active" href="../meeting/meeting.html">會議紀錄</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">🧠</span><span class="label">資料庫</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../resource/knowledge.html">知識庫</a></li>
            <li><a class="" href="../resource/ai-database.html">AI 資料庫</a></li>
          </ul>
        </section>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>會議紀錄</h1>
          <p>客服會議歷程與決議。</p>
        </div>
        <div class="topbar-actions">
          <div class="user-pill">● 已連線 Firebase</div>
        </div>
      </header>
      <section class="ragic-card" id="meetingListView" aria-label="會議紀錄列表">
        <div class="ragic-toolbar">
          <div><h2>會議紀錄列表</h2><p>顯示所有會議紀錄，點選任一列即可編輯。</p></div>
          <button class="primary" id="newRecordButton" type="button">+ 新增</button>
        </div>
        <div class="ragic-table-wrap">
          <table class="ragic-table meeting-list-table">
            <thead>
              <tr><th>日期</th><th>時間</th><th>主持</th><th>紀錄</th><th>編號</th></tr>
            </thead>
            <tbody id="meetingTableBody"></tbody>
          </table>
        </div>
      </section>
      
      <section class="ragic-card" id="meetingFormView" aria-label="會議紀錄編輯" hidden>
        <div class="ragic-form-toolbar"><h2 id="meetingFormTitle">新增會議紀錄</h2><button class="secondary" id="backToListButton" type="button">返回列表</button></div>
        <form id="meetingForm" class="meeting-form">
          <section class="meeting-info-table" aria-label="基本資訊">
            <div class="meeting-info-cell"><label for="meetingDate">日期</label><input id="meetingDate" type="date" required></div>
            <div class="meeting-info-cell"><label for="meetingChair">主持</label><select id="meetingChair" data-staff-select required></select></div>
            <div class="meeting-info-cell"><label for="meetingTime">時間</label><input id="meetingTime" type="time" required></div>
            <div class="meeting-info-cell"><label for="meetingRecorder">紀錄</label><select id="meetingRecorder" data-staff-select required></select></div>
            <div class="meeting-info-cell"><label for="meetingLocation">地點</label><input id="meetingLocation" type="text" autocomplete="off"></div>
            <div class="meeting-info-cell"><label for="meetingMorningAttendees">早 - 出席</label><select id="meetingMorningAttendees" data-staff-select multiple size="5"></select></div>
            <div class="meeting-info-cell"><label for="meetingSerial">編號</label><input id="meetingSerial" type="text" readonly></div>
            <div class="meeting-info-cell"><label for="meetingEveningAttendees">晚 - 出席</label><select id="meetingEveningAttendees" data-staff-select multiple size="5"></select></div>
            <div class="meeting-info-cell meeting-info-note"><label for="meetingNote">備註</label><input id="meetingNote" type="text" autocomplete="off"></div>
          </section>

          <section class="meeting-tabs-section" aria-label="會議內容分頁">
            <div class="meeting-tabs" id="meetingTabs" role="tablist">
              <button class="meeting-tab is-active" type="button" data-meeting-tab="techRows" role="tab">技術會議</button>
              <button class="meeting-tab" type="button" data-meeting-tab="csRows" role="tab">客服會議</button>
            </div>
            <div class="meeting-tab-panel" data-tab-panel="techRows">
              <div class="ragic-subtable-head"><h3>技術會議</h3><button class="secondary" type="button" data-add-row="techRows">+ 新增一列</button></div>
              <div class="ragic-table-wrap"><table class="meeting-detail-table"><thead><tr><th>提出者</th><th>內容</th><th>解決</th><th>備註</th><th>圖片</th><th>操作</th></tr></thead><tbody data-tab-body="techRows"></tbody></table></div>
            </div>
            <div class="meeting-tab-panel" data-tab-panel="csRows" hidden>
              <div class="ragic-subtable-head"><h3>客服會議</h3><button class="secondary" type="button" data-add-row="csRows">+ 新增一列</button></div>
              <div class="ragic-table-wrap"><table class="meeting-detail-table"><thead><tr><th>提出者</th><th>內容</th><th>解決</th><th>備註</th><th>圖片</th><th>操作</th></tr></thead><tbody data-tab-body="csRows"></tbody></table></div>
            </div>
          </section>
        </form>
        <div class="ragic-actions">
          <button class="ghost danger" id="deleteMeetingButton" type="button">刪除</button>
          <button class="primary" id="saveMeetingButton" form="meetingForm" type="submit">儲存</button>
        </div>
      </section>
      
      <div class="ragic-modal" id="meetingImageModal" hidden>
        <div class="ragic-modal-card ragic-image-modal-card">
          <div class="ragic-form-toolbar"><h2>圖片</h2><button class="ghost" id="closeMeetingImageModal" type="button">關閉</button></div>
          <img id="meetingPreviewImage" alt="放大圖片預覽">
        </div>
      </div>
    </main>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../assets/firebase-init.js"></script>
  <script src="../assets/app.js"></script>
  <script src="../assets/meeting.js"></script>
</body>
</html>
