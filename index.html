<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OMNIPLAY 客服系統-2</title>
  <style>
    :root {
      --bg: #eef3f9;
      --panel: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --sidebar: #0f172a;
      --sidebar-soft: #1e293b;
      --sidebar-text: #cbd5e1;
      --text: #172033;
      --muted: #64748b;
      --border: #dbe4ef;
      --success: #16a34a;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #dbeafe 0, transparent 34%), var(--bg);
    }

    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .login-card {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      overflow: hidden;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .brand-panel {
      padding: 56px;
      color: white;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      font-weight: 700;
      letter-spacing: .04em;
    }

    .brand-panel h1 {
      margin: 48px 0 16px;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.08;
    }

    .brand-panel p {
      margin: 0;
      color: #dbeafe;
      font-size: 18px;
      line-height: 1.8;
    }

    .login-form-wrap { padding: 56px; }

    .login-form-wrap h2 { margin: 0 0 8px; font-size: 30px; }
    .login-form-wrap .hint { margin: 0 0 32px; color: var(--muted); }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .field { margin-bottom: 20px; }

    input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .14);
    }

    button {
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: transform .2s, background .2s, box-shadow .2s;
    }

    button:hover { transform: translateY(-1px); }

    .login-btn {
      width: 100%;
      padding: 16px 20px;
      color: white;
      background: var(--primary);
      box-shadow: 0 12px 26px rgba(37, 99, 235, .28);
    }

    .login-btn:hover { background: var(--primary-dark); }

    .demo-note {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      color: #334155;
      background: #f8fafc;
      font-size: 14px;
      line-height: 1.6;
    }

    .app-shell {
      min-height: 100vh;
      display: none;
      grid-template-columns: 288px 1fr;
    }

    .app-shell.is-active { display: grid; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      color: var(--sidebar-text);
      background: var(--sidebar);
      transition: width .25s;
    }

    .sidebar.is-collapsed { width: 84px; }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 22px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-weight: 900;
      white-space: nowrap;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 14px;
      background: var(--primary);
    }

    .toggle-btn {
      width: 42px;
      height: 42px;
      color: white;
      background: var(--sidebar-soft);
    }

    .menu { padding: 18px 12px 28px; }

    .home-link {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 14px;
      color: var(--sidebar-text);
      background: transparent;
      text-decoration: none;
      font-weight: 800;
    }

    .home-link:hover,
    .home-link.is-active {
      color: white;
      background: rgba(37, 99, 235, .42);
    }
    
    .menu-section { margin-bottom: 12px; }

    .section-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      color: white;
      background: transparent;
      text-align: left;
    }

    .section-button:hover,
    .section-button.is-open { background: var(--sidebar-soft); }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .icon { width: 24px; text-align: center; flex: 0 0 auto; }
    .chevron { transition: transform .2s; }
    .section-button.is-open .chevron { transform: rotate(90deg); }

    .submenu {
      display: none;
      margin: 6px 0 0;
      padding: 0 0 0 48px;
      list-style: none;
    }

    .submenu.is-open { display: block; }

    .submenu a {
      display: block;
      padding: 11px 12px;
      border-radius: 12px;
      color: var(--sidebar-text);
      text-decoration: none;
    }

    .submenu a:hover,
    .submenu a.is-active {
      color: white;
      background: rgba(37, 99, 235, .42);
    }

    .sidebar.is-collapsed .label,
    .sidebar.is-collapsed .chevron { display: none; }
    .sidebar.is-collapsed .sidebar-header { justify-content: center; flex-direction: column; }
    .sidebar.is-collapsed .home-link { justify-content: center; }
    .sidebar.is-collapsed .submenu { padding-left: 0; }
    .sidebar.is-collapsed .submenu a { text-align: center; font-size: 12px; }
    .sidebar.is-collapsed .section-button { justify-content: center; }

    .main {
      min-width: 0;
      padding: 30px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 26px;
      padding: 22px 24px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 14px 32px rgba(15, 23, 42, .07);
    }

    .topbar h1 { margin: 0 0 6px; font-size: 28px; }
    .topbar p { margin: 0; color: var(--muted); }

    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #ecfdf5;
      color: #166534;
      font-weight: 800;
      white-space: nowrap;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .stat-card, .content-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: white;
      box-shadow: 0 12px 28px rgba(15, 23, 42, .06);
    }

    .stat-card { padding: 22px; }
    .stat-card span { color: var(--muted); font-weight: 700; }
    .stat-card strong { display: block; margin-top: 10px; font-size: 34px; }

    .content-card {
      margin-top: 18px;
      padding: 24px;
    }

    .content-card h2 { margin: 0 0 14px; }
    .task-list { margin: 0; padding: 0; list-style: none; }
    .task-list li {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-top: 1px solid var(--border);
    }
    .task-list li:first-child { border-top: 0; }
    .status { color: var(--success); font-weight: 800; }

    .page-data-panel {
      margin-top: 18px;
      display: none;
    }

    .page-data-panel.is-active { display: block; }

    .data-form {
      display: grid;
      grid-template-columns: minmax(180px, 280px) 1fr auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 18px;
    }

    .data-form textarea {
      width: 100%;
      min-height: 54px;
      padding: 15px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font: inherit;
      outline: none;
      resize: vertical;
      transition: border .2s, box-shadow .2s;
    }

    .data-form textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .14);
    }

    .save-btn, .delete-btn {
      padding: 15px 18px;
      color: white;
      background: var(--primary);
      box-shadow: 0 10px 22px rgba(37, 99, 235, .22);
    }

    .delete-btn {
      padding: 9px 12px;
      background: #dc2626;
      box-shadow: none;
      font-size: 14px;
    }

    .data-status {
      min-height: 24px;
      margin: 0 0 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .data-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .data-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #f8fafc;
    }

    .data-item strong { display: block; margin-bottom: 6px; }
    .data-item p { margin: 0; color: #334155; white-space: pre-wrap; }
    .data-item time { display: block; margin-top: 8px; color: var(--muted); font-size: 13px; }
    
    @media (max-width: 900px) {
      .login-card { grid-template-columns: 1fr; }
      .brand-panel, .login-form-wrap { padding: 36px; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .sidebar.is-collapsed { width: auto; }
      .dashboard-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .data-form { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .login-page, .main { padding: 18px; }
      .dashboard-grid { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <section class="login-page" id="loginPage" aria-label="登入頁面">
    <div class="login-card">
      <div class="brand-panel">
        <div class="brand-badge">◎ OMNIPLAY CSR</div>
        <h1>客服支援管理系統</h1>
        <p>整合客服人員、作業追蹤、會議紀錄與知識資料庫，讓每日值班與交接更清楚。</p>
      </div>
      <div class="login-form-wrap">
        <h2>登入系統</h2>
        <p class="hint">請輸入帳號與密碼進入客服後台。</p>
        <form id="loginForm">
          <div class="field">
            <label for="account">帳號</label>
            <input id="account" name="account" type="text" placeholder="請輸入帳號" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">密碼</label>
            <input id="password" name="password" type="password" placeholder="請輸入密碼" autocomplete="current-password" required />
          </div>
          <button class="login-btn" type="submit">登入</button>
        </form>
        <div class="demo-note">展示版：任意帳號與密碼皆可登入，用於預覽客服系統畫面。</div>
      </div>
    </div>
  </section>

  <section class="app-shell" id="appShell" aria-label="客服系統主畫面">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-mark">OP</span><span class="label">CSR Support</span></div>
        <button class="toggle-btn" id="sidebarToggle" type="button" aria-label="收合左側功能表">☰</button>
      </div>
      <nav class="menu" aria-label="主功能表" id="menu">
        <a class="home-link is-active" href="#" id="homeLink"><span class="icon">🏠</span><span class="label">首頁</span></a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">首頁</h1>
          <p id="pageDescription">快速查看今日客服營運重點與待辦作業。</p>
        </div>
        <div class="user-pill">● 已登入 <span id="loginUser">客服人員</span></div>
      </header>

      <section class="dashboard-grid home-panel" aria-label="客服統計">
        <article class="stat-card"><span>今日上班</span><strong>12</strong></article>
        <article class="stat-card"><span>待交接</span><strong>8</strong></article>
        <article class="stat-card"><span>提報追蹤</span><strong>5</strong></article>
        <article class="stat-card"><span>知識庫文章</span><strong>128</strong></article>
      </section>

      <section class="content-card home-panel">
        <h2>今日待辦</h2>
        <ul class="task-list">
          <li><span>確認當日上班人員與休假表</span><span class="status">進行中</span></li>
          <li><span>更新客服日誌與交接事項</span><span class="status">待處理</span></li>
          <li><span>整理會議紀錄並同步 AI 資料庫</span><span class="status">待處理</span></li>
        </ul>
      </section>
      
      <section class="content-card page-data-panel" id="pageDataPanel" aria-live="polite">
        <h2 id="dataPanelTitle">分頁資料庫</h2>
        <p class="data-status" id="dataStatus">請選擇左側分頁以載入該分頁的專屬資料庫。</p>
        <form class="data-form" id="dataForm">
          <input id="dataTitle" name="title" type="text" placeholder="資料標題" required />
          <textarea id="dataContent" name="content" placeholder="輸入這個分頁要保存的內容" required></textarea>
          <button class="save-btn" type="submit">新增資料</button>
        </form>
        <ul class="data-list" id="dataList"></ul>
      </section>
    </main>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAnalytics, isSupported as isAnalyticsSupported } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
    import {
      addDoc,
      collection,
      deleteDoc,
      doc,
      getFirestore,
      onSnapshot,
      orderBy,
      query,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB5GdlMKz809ITGf7fMpDsYPVFnDAdnh-0",
      authDomain: "omniplay-csr-support.firebaseapp.com",
      projectId: "omniplay-csr-support",
      storageBucket: "omniplay-csr-support.firebasestorage.app",
      messagingSenderId: "248758412651",
      appId: "1:248758412651:web:d417fb1956442170bc182e",
      measurementId: "G-RSCV4ZGTQH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    isAnalyticsSupported().then((supported) => {
      if (supported) getAnalytics(app);
    });

    const menuData = [
      { title: '客服內部', icon: '👥', items: ['人員管理', '當日上班人員', '休假表', '排程表'] },
      { title: '作業管理', icon: '🗂️', items: ['日誌', '交接', '提報', '對接追蹤'] },
      { title: '會議歷程', icon: '📝', items: ['會議紀錄'] },
      { title: '資料庫', icon: '🧠', items: ['知識庫', 'AI 資料庫'] }
    ];

    const menu = document.querySelector('#menu');
    const homeLink = document.querySelector('#homeLink');
    const sidebar = document.querySelector('#sidebar');
    const sidebarToggle = document.querySelector('#sidebarToggle');
    const loginForm = document.querySelector('#loginForm');
    const loginPage = document.querySelector('#loginPage');
    const appShell = document.querySelector('#appShell');
    const loginUser = document.querySelector('#loginUser');
    const pageTitle = document.querySelector('#pageTitle');
    const pageDescription = document.querySelector('#pageDescription');
    const homePanels = document.querySelectorAll('.home-panel');
    const pageDataPanel = document.querySelector('#pageDataPanel');
    const dataPanelTitle = document.querySelector('#dataPanelTitle');
    const dataStatus = document.querySelector('#dataStatus');
    const dataForm = document.querySelector('#dataForm');
    const dataTitle = document.querySelector('#dataTitle');
    const dataContent = document.querySelector('#dataContent');
    const dataList = document.querySelector('#dataList');
    let activePage = null;
    let unsubscribePageData = null;


    const pageKey = (sectionTitle, itemTitle) => `${sectionTitle}-${itemTitle}`
      .trim()
      .toLowerCase()
      .replace(/\s+/g, '-')
      .replace(/[^\p{Letter}\p{Number}-]+/gu, '');

    const formatDate = (timestamp) => {
      if (!timestamp) return '剛剛建立';
      return timestamp.toDate().toLocaleString('zh-TW', { hour12: false });
    };

    const setDataStatus = (message) => {
      dataStatus.textContent = message;
    };

    const renderPageData = (docs) => {
      dataList.replaceChildren();
      if (!docs.length) {
        const empty = document.createElement('li');
        empty.className = 'data-item';
        empty.innerHTML = '<div><strong>尚無資料</strong><p>新增第一筆資料後，會儲存在這個分頁自己的 Firestore 集合。</p></div>';
        dataList.appendChild(empty);
        return;
      }

      docs.forEach((snapshot) => {
        const data = snapshot.data();
        const item = document.createElement('li');
        item.className = 'data-item';

        const body = document.createElement('div');
        const title = document.createElement('strong');
        title.textContent = data.title || '未命名資料';
        const content = document.createElement('p');
        content.textContent = data.content || '';
        const time = document.createElement('time');
        time.textContent = `更新時間：${formatDate(data.createdAt)}`;
        body.append(title, content, time);

        const deleteButton = document.createElement('button');
        deleteButton.className = 'delete-btn';
        deleteButton.type = 'button';
        deleteButton.textContent = '刪除';
        deleteButton.addEventListener('click', async () => {
          await deleteDoc(doc(db, activePage.collectionPath, snapshot.id));
        });

        item.append(body, deleteButton);
        dataList.appendChild(item);
      });
    };

    const activatePageDatabase = (sectionTitle, itemTitle) => {
      activePage = {
        title: itemTitle,
        collectionPath: `pageDatabases/${pageKey(sectionTitle, itemTitle)}/records`
      };
      pageDataPanel.classList.add('is-active');
      dataPanelTitle.textContent = `${itemTitle}｜專屬資料庫`;
      dataForm.reset();
      setDataStatus(`正在載入 ${itemTitle} 的專屬資料庫...`);

      if (unsubscribePageData) unsubscribePageData();
      const recordsQuery = query(collection(db, activePage.collectionPath), orderBy('createdAt', 'desc'));
      unsubscribePageData = onSnapshot(recordsQuery, (snapshot) => {
        setDataStatus(`目前共有 ${snapshot.size} 筆資料，儲存在 ${activePage.collectionPath}`);
        renderPageData(snapshot.docs);
      }, (error) => {
        setDataStatus(`資料庫讀取失敗：${error.message}`);
      });
    };

    const activateHome = () => {
      document.querySelectorAll('.submenu a, .home-link').forEach((anchor) => anchor.classList.remove('is-active'));
      homeLink.classList.add('is-active');
      pageTitle.textContent = '首頁';
      pageDescription.textContent = '快速查看今日客服營運重點與待辦作業。';
      homePanels.forEach((panel) => { panel.hidden = false; });
      pageDataPanel.classList.remove('is-active');
      activePage = null;
      if (unsubscribePageData) {
        unsubscribePageData();
        unsubscribePageData = null;
      }
    };

    homeLink.addEventListener('click', (event) => {
      event.preventDefault();
      activateHome();
    });

    menuData.forEach((section, index) => {
      const wrapper = document.createElement('section');
      wrapper.className = 'menu-section';

      const button = document.createElement('button');
      button.className = `section-button ${index === 0 ? 'is-open' : ''}`;
      button.type = 'button';
      button.innerHTML = `<span class="section-title"><span class="icon">${section.icon}</span><span class="label">${section.title}</span></span><span class="chevron">›</span>`;

      const list = document.createElement('ul');
      list.className = `submenu ${index === 0 ? 'is-open' : ''}`;

      section.items.forEach((item, itemIndex) => {
        const li = document.createElement('li');
        const link = document.createElement('a');
        link.href = '#';
        link.textContent = item;
        link.addEventListener('click', (event) => {
          event.preventDefault();
          document.querySelectorAll('.submenu a, .home-link').forEach((anchor) => anchor.classList.remove('is-active'));
          link.classList.add('is-active');
          pageTitle.textContent = item;
          pageDescription.textContent = `${section.title} / ${item} 的資料維護與查詢作業。`;
          homePanels.forEach((panel) => { panel.hidden = true; });
          activatePageDatabase(section.title, item);
        });
        li.appendChild(link);
        list.appendChild(li);
      });

      button.addEventListener('click', () => {
        button.classList.toggle('is-open');
        list.classList.toggle('is-open');
      });

      wrapper.append(button, list);
      menu.appendChild(wrapper);
    });

    dataForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!activePage) return;

      const title = dataTitle.value.trim();
      const content = dataContent.value.trim();
      if (!title || !content) return;

      setDataStatus('正在儲存資料...');
      try {
        await addDoc(collection(db, activePage.collectionPath), {
          title,
          content,
          createdAt: serverTimestamp(),
          pageTitle: activePage.title
        });
        dataForm.reset();
      } catch (error) {
        setDataStatus(`資料儲存失敗：${error.message}`);
      }
    });

    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('is-collapsed');
    });

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(loginForm);
      loginUser.textContent = formData.get('account') || '客服人員';
      loginPage.style.display = 'none';
      appShell.classList.add('is-active');
    });
  </script>
</body>
</html>
