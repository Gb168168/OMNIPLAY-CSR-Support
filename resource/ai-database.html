<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 資料庫｜OMNIPLAY 客服系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="manifest" href="/OMNIPLAY-CSR-Support/manifest.json" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
</head>
<body>
  <section class="app-shell" aria-label="客服系統主畫面">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-mark">OP</span><span class="label">CSR Support</span></div>
        <button class="toggle-btn mobile-menu-btn" id="sidebarToggle" type="button" aria-label="收合左側功能表">☰</button>
      </div>
      <nav class="menu" aria-label="主功能表">
        <a class="home-link" href="../index.html"><span class="icon">🏠</span><span class="label">首頁</span></a>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">👥</span><span class="label">客服內部</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../service/staff.html">人員管理</a></li>
            <li><a class="" href="../service/leave.html">休假表</a></li>
            <li><a class="" href="../service/schedule.html">排程表</a></li>
            <li><a class="" href="../service/kpi.html">KPI</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">🗂️</span><span class="label">作業管理</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../work/log.html">日誌</a></li>
            <li><a class="" href="../work/handover.html">交接</a></li>
            <li><a class="" href="../work/report.html">提報</a></li>
            <li><a class="" href="../work/tracking.html">對接追蹤</a></li>
            <li><a class="" href="../work/alert.html">PROD告警紀錄</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button" type="button"><span class="section-title"><span class="icon">📝</span><span class="label">會議歷程</span></span><span class="chevron">›</span></button>
          <ul class="submenu">
            <li><a class="" href="../meeting/meeting.html">會議紀錄</a></li>
          </ul>
        </section>
        <section class="menu-section">
          <button class="section-button is-open" type="button"><span class="section-title"><span class="icon">🧠</span><span class="label">資料庫</span></span><span class="chevron">›</span></button>
          <ul class="submenu is-open">
            <li><a class="" href="../resource/knowledge.html">知識庫</a></li>
            <li><a class="is-active" href="../resource/ai-database.html">AI 資料庫</a></li>
          </ul>
        </section>
      </nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>AI 資料庫</h1>
          <p>AI 相關資料與內容維護。</p>
        </div>
        <div class="user-pill">● 已連線 Firebase</div>
      </header>
      <section class="ragic-card" id="ragicListView" aria-label="列表視圖">
        <div class="ragic-toolbar">
          <div><h2 id="ragicTitle"></h2><p id="ragicSubtitle"></p></div>
          <button class="primary" id="newRecordButton" type="button">+ 新增</button>
        </div>
        <div class="ragic-table-wrap">
          <table class="ragic-table">
            <thead><tr id="ragicHeaderRow"></tr></thead>
            <tbody id="ragicTableBody"></tbody>
          </table>
        </div>
      </section>
      <section class="ragic-card" id="ragicFormView" aria-label="主表單視圖" hidden>
        <div class="ragic-form-toolbar"><h2></h2><button class="secondary" id="backToListButton" type="button">返回列表</button></div>
        <form id="ragicForm"></form>
        <div class="ragic-actions">
          <button class="ghost danger" id="deleteButton" type="button">刪除</button>
          <button class="primary" form="ragicForm" type="submit">儲存</button>
        </div>
      </section>
    </main>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../assets/firebase-init.js"></script>
  <script src="../assets/app.js"></script>
  <script src="../assets/ragic-table.js"></script>
  <script>
    initRagicPage({
      title: 'AI 資料庫',
      collection: 'aiDatabase',
      fields: [
        { key: 'category', label: '分類', type: 'text' },
        { key: 'title', label: '標題', type: 'text' },
        { key: 'content', label: '內容', type: 'textarea', rows: 5 },
        { key: 'tags', label: '標籤', type: 'text' },
        { key: 'createdDate', label: '建立日期', type: 'date', defaultToday: true }
      ],
      listColumns: ['category', 'title', 'tags', 'createdDate']
    });
  </script>
</body>
</html>
