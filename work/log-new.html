  <script>
    // ж—ҘиӘҢ NEW е…ҚиІ» AI и©Ұз”ЁпјҡдҪҝз”Ё Puter.jsпјҢдёҚеңЁе…¬й–Ӣз¶Із«ҷдҝқеӯҳ API йҮ‘й‘°гҖӮ
    const normalizeLogNewAiAnalysis = (value = '') => {
      const raw = String(value).replace(/\r\n?/g, '\n').trim();
      const allTitles = ['е®ўжҲ¶е•ҸйЎҢ', 'е®ўжҲ¶ең–зүҮ', 'е…§йғЁиҷ•зҗҶ', 'жҲ‘ж–№ең–зүҮ', 'е•ҸйЎҢеҲӨж–·', 'зӣ®еүҚйҖІеәҰ', 'еҫҢзәҢеҫ…иҫҰ'];
      const parts = {};
      allTitles.forEach((title) => {
        const next = allTitles.filter((item) => item !== title).join('|');
        const match = raw.match(new RegExp(`гҖҗ${title}гҖ‘\\s*([\\s\\S]*?)(?=гҖҗ(?:${next})гҖ‘|$)`));
        parts[title] = match?.[1]?.trim() || '';
      });
      if (parts['е®ўжҲ¶ең–зүҮ']) parts['е®ўжҲ¶е•ҸйЎҢ'] = [parts['е®ўжҲ¶е•ҸйЎҢ'], `ең–зүҮйҮҚй»һпјҡ${parts['е®ўжҲ¶ең–зүҮ']}`].filter(Boolean).join('\n');
      if (parts['жҲ‘ж–№ең–зүҮ']) parts['е…§йғЁиҷ•зҗҶ'] = [parts['е…§йғЁиҷ•зҗҶ'], `ең–зүҮзөҗжһңпјҡ${parts['жҲ‘ж–№ең–зүҮ']}`].filter(Boolean).join('\n');
      if (!allTitles.some((title) => parts[title])) parts['е•ҸйЎҢеҲӨж–·'] = raw;
      return ['е®ўжҲ¶е•ҸйЎҢ', 'е…§йғЁиҷ•зҗҶ', 'е•ҸйЎҢеҲӨж–·', 'зӣ®еүҚйҖІеәҰ', 'еҫҢзәҢеҫ…иҫҰ']
        .map((title) => `гҖҗ${title}гҖ‘\n${parts[title] || 'е°Қи©ұжҲ–ең–зүҮжңӘжҸҗдҫӣ'}`)
        .join('\n\n');
    };

    window.applyLogNewAiResult = (row, result = {}) => {
      if (!row) return;
      const analysis = row.querySelector('[data-subfield="ai_analysis"]');
      const summary = row.querySelector('[data-subfield="summary"]');
      const issue = document.querySelector('#ragicForm [name="issue"]');
      if (analysis) analysis.value = normalizeLogNewAiAnalysis(result.analysis || '');
      if (summary) summary.value = result.summary || '';
      if (issue) issue.value = `е®ўжҲ¶пјҡ${result.customerBrief || ''}\nе®ўжңҚпјҡ${result.supportBrief || ''}`;
    };

    // е°ҮиҒҠеӨ©и»ҹй«”еҢҜеҮәзҡ„гҖҢ[ж—Ҙжңҹ дёҠеҚҲ/дёӢеҚҲ жҷӮй–“] дәәе“Ў: е…§е®№гҖҚиҮӘеӢ•ж•ҙзҗҶжҲҗжҳ“и®Җж јејҸгҖӮ
    const normalizeLogNewConversation = (value = '') => {
      const text = String(value).replace(/\r\n?/g, '\n').trim();
      const headerPattern = /\[(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(дёҠеҚҲ|дёӢеҚҲ|AM|PM|am|pm)\s+(\d{1,2}):(\d{2})(?::\d{2})?\]\s*[^\n:пјҡ]{1,120}?[:пјҡ]/g;
      const entries = [];
      let match;
      while ((match = headerPattern.exec(text))) entries.push({ match: [...match], index: match.index, end: headerPattern.lastIndex, header: match[0].trim() });
      if (!entries.length) return text;
      entries.forEach((entry, index) => {
        const nextIndex = entries[index + 1]?.index ?? text.length;
        entry.content = text.slice(entry.end, nextIndex).replace(/\n*\s*-{6,}\s*$/g, '').trim();
      });
      const hour24 = (entry) => {
        let hour = Number(entry.match[5]);
        const period = String(entry.match[4]).toLowerCase();
        if ((period === 'дёӢеҚҲ' || period === 'pm') && hour < 12) hour += 12;
        if ((period === 'дёҠеҚҲ' || period === 'am') && hour === 12) hour = 0;
        return hour;
      };
      const dateNumber = (entry) => Date.UTC(Number(entry.match[1]), Number(entry.match[2]) - 1, Number(entry.match[3]));
      const isNightShiftContinuation = (previous, current) => dateNumber(current) - dateNumber(previous) === 86400000 && hour24(previous) >= 20 && hour24(current) < 8;
      return entries.map((entry, index) => {
        const body = `${entry.header}${entry.content ? `\n${entry.content}` : ''}`;
        if (!index) return body;
        const previous = entries[index - 1];
        const crossedDate = dateNumber(previous) !== dateNumber(entry);
        return `${crossedDate && !isNightShiftContinuation(previous, entry) ? '------\n\n' : ''}${body}`;
      }).join('\n\n');
    };

    const migrateSavedLogNewConversations = async () => {

    const compressLogNewConversationImage = (file) => new Promise((resolve, reject) => {
      if (!file?.type?.startsWith('image/')) return reject(new Error('еҸӘиғҪдёҠеӮіең–зүҮжӘ”жЎҲ'));
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('ең–зүҮи®ҖеҸ–еӨұж•—'));
      reader.onload = () => {
        const image = new Image();
        image.onerror = () => reject(new Error('ең–зүҮж јејҸз„Ўжі•иҫЁиӯҳ'));
        image.onload = () => {
          const scale = Math.min(1, 640 / image.width);
          const canvas = document.createElement('canvas');
          canvas.width = Math.max(1, Math.round(image.width * scale));
          canvas.height = Math.max(1, Math.round(image.height * scale));
          const context = canvas.getContext('2d');
          context.fillStyle = '#fff';
          context.fillRect(0, 0, canvas.width, canvas.height);
          context.drawImage(image, 0, 0, canvas.width, canvas.height);
          canvas.toBlob((blob) => {
            if (!blob) return reject(new Error('ең–зүҮеЈ“зё®еӨұж•—'));
            const output = new FileReader();
            output.onerror = () => reject(new Error('ең–зүҮиҪүжҸӣеӨұж•—'));
            output.onload = () => resolve(output.result);
            output.readAsDataURL(blob);
          }, 'image/jpeg', 0.42);
        };
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    const parseLogNewAiResponse = (rawValue) => {
      const raw = String(rawValue || '').replace(/^\s*```(?:json)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
      const taggedKeys = [
        ['analysis', 'ANALYSIS'],
        ['summary', 'SUMMARY'],
        ['customerBrief', 'CUSTOMER_BRIEF'],
        ['supportBrief', 'SUPPORT_BRIEF']
      ];
      const taggedResult = {};
      taggedKeys.forEach(([key, tag], index) => {
        const nextTag = taggedKeys[index + 1]?.[1] || 'END';
        const match = raw.match(new RegExp(`<<<${tag}>>>\\s*([\\s\\S]*?)(?=<<<${nextTag}>>>|$)`, 'i'));
        if (match) taggedResult[key] = match[1].trim();
      });
      if (taggedKeys.every(([key]) => typeof taggedResult[key] === 'string')) return taggedResult;
      const objectText = raw.match(/\{[\s\S]*\}/)?.[0] || raw;
      try {
        const parsed = JSON.parse(objectText);
        if (parsed && typeof parsed === 'object') return parsed;
      } catch (_) {
        // AI жңүжҷӮжңғеңЁ JSON еӯ—дёІе…§зӣҙжҺҘијёеҮәжҸӣиЎҢпјӣд»ҘдёӢж”№з”Ёж¬„дҪҚйӮҠз•Ңе®№йҢҜж“·еҸ–гҖӮ
      }
      const keys = ['analysis', 'summary', 'customerBrief', 'supportBrief'];
      const result = {};
      keys.forEach((key, index) => {
        const nextKeys = keys.slice(index + 1).join('|');
        const ending = nextKeys ? `(?=\\s*,?\\s*"(?:${nextKeys})"\\s*:|\\s*})` : '(?=\\s*})';
        const match = objectText.match(new RegExp(`"${key}"\\s*:\\s*"([\\s\\S]*?)"\\s*${ending}`));
        if (!match) return;
        result[key] = match[1]
          .replace(/\\n/g, '\n')
          .replace(/\\r/g, '')
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, '\\')
          .trim();
      });
      if (keys.every((key) => typeof result[key] === 'string')) return result;
      throw new Error('AI еӣһеӮіж јејҸдёҚжӯЈзўә');
    };

    const logNewAiResponseText = (response) => {
      if (typeof response === 'string') return response;

      if (typeof content === 'string') return content;
      if (Array.isArray(content)) return content.map((item) => item?.text || '').filter(Boolean).join('\n');
      return String(content || response || '');
    };

    const logNewImageMedia = (source, index) => {
      if (!String(source).startsWith('data:')) return source;
      const [header, encoded = ''] = String(source).split(',', 2);
      const mime = header.match(/^data:([^;]+)/)?.[1] || 'image/jpeg';
      const binary = atob(encoded);
      const bytes = new Uint8Array(binary.length);
      for (let offset = 0; offset < binary.length; offset += 1) bytes[offset] = binary.charCodeAt(offset);
      return new File([bytes], `log-new-image-${index + 1}.${mime.includes('png') ? 'png' : 'jpg'}`, { type: mime });
    };

    const inferLogNewImageOwner = (conversation, imageNumber, selectedSource) => {
      if (selectedSource === 'е®ўжҲ¶' || selectedSource === 'жҲ‘ж–№еңҳйҡҠ') return selectedSource;
      const marker = new RegExp(`[пјҲ(]\\s*ең–\\s*${imageNumber}\\s*[пјү)]`, 'i').exec(conversation);
      if (!marker) return 'дҫҶжәҗеҫ…зўәиӘҚ';
      const beforeMarker = conversation.slice(0, marker.index);
      const headerPattern = /\[[^\]\n]+\]\s*([^\n:пјҡ]{1,120})[:пјҡ]/g;
      let header;
      let speaker = '';
      while ((header = headerPattern.exec(beforeMarker))) speaker = header[1].trim();
      const normalizedSpeaker = speaker.toLowerCase().replace(/[_\s-]+/g, ' ');
      const internalNames = [
        'igaming op', 'дёӯйӯҒ', 'jerry hu', 'andy chou', 'jim li', 'lucas', 'anton', 'hazel',
        'pc am', 'cia', 'weiliya', 'apple', 'diane', 'kkaren', 'crystal', 'rondo', 'leo chang',
        'yeh ryan', 'chuan chia lai', 'иіў rd', 'nick', 'nina', 'ејөе®¶иұӘ', 'yuting wang', 'chang how',
        'weili huang', 'ellie', 'mike yu', 'дҝ®е…Ё', 'tony yang', 'andrew', 'pien', 'suigetsu'
      ];
      return internalNames.some((name) => normalizedSpeaker.includes(name)) ? 'жҲ‘ж–№еңҳйҡҠ' : (speaker ? 'е®ўжҲ¶' : 'дҫҶжәҗеҫ…зўәиӘҚ');
    };

        });

          analysisSucceeded = true;
          showProgress(100);
          alert('AI еҲҶжһҗе®ҢжҲҗпјҢе·ІеЎ«е…ҘгҖҢAIеҲҶжһҗгҖҚгҖҒгҖҢзёҪзөҗгҖҚеҸҠгҖҢе•ҸйЎҢжҸҸиҝ°гҖҚпјҢи«ӢзўәиӘҚе…§е®№еҫҢеҶҚе„ІеӯҳгҖӮ');
        } catch (error) {
          console.error('ж—ҘиӘҢ NEW AI еҲҶжһҗеӨұж•—пјҡ', error);
          alert(`AI еҲҶжһҗеӨұж•—пјҡ${error?.message || 'и«ӢзЁҚеҫҢеҶҚи©Ұ'}гҖӮиӢҘйҰ–ж¬ЎдҪҝз”ЁпјҢи«Ӣе…Ҳе®ҢжҲҗ Puter зҷ»е…ҘжҺҲж¬ҠгҖӮ`);
        } finally {
          clearInterval(progressTimer);
          button.disabled = false;
          if (analysisSucceeded) {
            button.textContent = 'вң… AI еҲҶжһҗе®ҢжҲҗ 100%';
            setTimeout(() => { if (!button.disabled) button.textContent = originalText; }, 1800);
          } else {
            button.textContent = originalText;
          }
        }
      });
      actionGroup.appendChild(button);
    };

    // иЁӯиЁҲеҷЁе„ІеӯҳжҲҗеҠҹдёҰй—ңй–үеҫҢйҮҚж–°ијүе…ҘпјҢзўәдҝқжңҖж–° Firebase жҺ’зүҲз«ӢеҲ»еҘ—з”ЁеҲ°ж—ҘиӘҢ NEWгҖӮ
    document.querySelector('#saveSchemaButton')?.addEventListener('click', () => {
      let checks = 0;
      const waitForDesignerSave = setInterval(() => {
        checks += 1;
        const modal = document.querySelector('#ragicDesignerModal');
        if (modal?.hidden) {
          clearInterval(waitForDesignerSave);
          window.location.reload();
        } else if (checks >= 30) {
          clearInterval(waitForDesignerSave);
        }
      }, 200);
    });

    // иЁӯиЁҲеҷЁеҺҹжң¬д»Ҙе®№еҷЁеҜ¬еәҰжҺЁз®—жӢ–жӣіеә§жЁҷпјҢдҪҶж јз·ҡеҜҰйҡӣеӣәе®ҡзӮә 131Г—48пјҢжңғйҖ жҲҗиҗҪй»һеҒҸз§»гҖӮ
    // е°Үз•«еёғзҡ„еҜҰйҡӣе°әеҜёйҺ–е®ҡзӮәж јз·ҡзёҪе°әеҜёпјҢи®“е…ұз”ЁжӢ–жӣіе…¬ејҸеҸ–еҫ—жӯЈзўәзҡ„жҜҸж јеҜ¬й«ҳгҖӮ
    let fixingLogNewDesignerGrid = false;
    const fixLogNewDesignerGrid = () => {
      if (fixingLogNewDesignerGrid) return;
      const grid = document.querySelector('#ragicDesignerModal:not([hidden]) #layoutDesignerPanel .layout-grid');
      if (!grid) return;
      const columns = Math.max(1, Number(grid.dataset.columns) || 1);
      const rows = Math.max(1, Number(grid.dataset.rows) || 1);
      const gap = 4;
      const width = (columns * 131) + ((columns - 1) * gap);
      const height = (rows * 48) + ((rows - 1) * gap);
      const signature = `${columns}x${rows}`;
      if (grid.dataset.logNewGridFixed === signature) return;
      fixingLogNewDesignerGrid = true;
      grid.style.setProperty('grid-template-columns', `repeat(${columns}, 131px)`, 'important');
      grid.style.setProperty('grid-template-rows', `repeat(${rows}, 48px)`, 'important');
      grid.style.setProperty('width', `${width}px`, 'important');
      grid.style.setProperty('height', `${height}px`, 'important');
      grid.dataset.logNewGridFixed = signature;
      fixingLogNewDesignerGrid = false;
    };
    const designerGridObserver = new MutationObserver(() => requestAnimationFrame(fixLogNewDesignerGrid));
    const designerPanel = document.querySelector('#layoutDesignerPanel');
    if (designerPanel) designerGridObserver.observe(designerPanel, { childList: true, subtree: true });
    document.querySelector('#designTableButton')?.addEventListener('click', () => requestAnimationFrame(fixLogNewDesignerGrid));

    new MutationObserver(enhanceLogNewAiUi).observe(document.querySelector('#ragicFormView'), { childList: true, subtree: true });
    enhanceLogNewAiUi();
    migrateSavedLogNewConversations();
  </script>
</body>
</html>
