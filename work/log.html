<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>日誌｜OMNIPLAY 客服系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="manifest" href="/OMNIPLAY-CSR-Support/manifest.json" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="../assets/icon-192.png" />
</head>
<body>
  <section class="app-shell" aria-label="客服系統主畫面">
    <aside id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>日誌</h1>
          <p>每日客服作業日誌。</p>
        </div>
        <div class="topbar-actions">
          <button class="secondary" id="designTableButton" type="button">⚙️ 設計表格</button>
          <div class="user-pill">● 已連線 Firebase</div>
        </div>
      </header>
      <section class="ragic-card" id="ragicListView" aria-label="列表視圖">
        <div class="ragic-toolbar">
          <div><h2 id="ragicTitle"></h2><p id="ragicSubtitle"></p></div>
          <button class="primary" id="newRecordButton" type="button">+ 新增</button>
        </div>
        <div class="ragic-table-wrap">
          <table class="ragic-table">
            <thead><tr id="ragicHeaderRow"></tr></thead>
            <tbody id="ragicTableBody"></tbody>
          </table>
        </div>
      </section>
      <section class="ragic-card" id="ragicFormView" aria-label="主表單視圖" hidden>
        <div class="ragic-form-toolbar"><h2></h2><button class="secondary" id="backToListButton" type="button">返回列表</button></div>
        <form id="ragicForm"></form>
        <div class="ragic-actions">
          <button class="ghost danger" id="deleteButton" type="button">刪除</button>
          <button class="primary" form="ragicForm" type="submit">儲存</button>
        </div>
      </section>
    </main>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../assets/firebase-init.js"></script>
  <script src="../assets/app.js"></script>
  <script src="../assets/ragic-table.js"></script>
  <script>
    initRagicPage({
      title: '日誌',
      collection: 'workLogs',
      fields: [
        { key: 'date', label: '日期', type: 'date', defaultToday: true },
        { key: 'shift', label: '班別', type: 'select', options: ['早班', '中班', '晚班', '大夜'] },
        { key: 'staff', label: '人員', type: 'text' },
        { key: 'category', label: '分類', type: 'text' },
        { key: 'items', label: '日誌明細', type: 'subtable', fields: [
          { key: 'time', label: '時間', type: 'time' },
          { key: 'content', label: '事項內容', type: 'textarea' },
          { key: 'note', label: '備註', type: 'textarea' }
        ]}
      ],
      formLayout: {
        columns: 6,
        fields: {
          '日期': { row: 1, col: 1 },
          '班別': { row: 1, col: 2 },
          '人員': { row: 1, col: 3 },
          '分類': { row: 1, col: 4 },
          '日誌明細': { row: 2, col: 1, colSpan: 5 }
        }
      },
      listColumns: ['date', 'shift', 'staff', 'category']
    });
  </script>
</body>
</html>
