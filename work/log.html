<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>日誌｜OMNIPLAY 客服系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="manifest" href="/OMNIPLAY-CSR-Support/manifest.json" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="../assets/icon-192.png" />
</head>
<body>
  <section class="app-shell" aria-label="客服系統主畫面">
    <aside id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>日誌</h1>
          <p>每日客服作業日誌。</p>
        </div>
        <div class="topbar-actions">
          <button class="secondary" id="designTableButton" type="button">⚙️ 設計表格</button>
          <div class="user-pill">● 已連線 Firebase</div>
        </div>
      </header>
      <section class="ragic-card" id="ragicListView" aria-label="列表視圖">
        <div class="ragic-toolbar">
          <div><h2 id="ragicTitle"></h2><p id="ragicSubtitle"></p></div>
          <button class="primary" id="newRecordButton" type="button">+ 新增</button>
        </div>
        <div class="ragic-table-wrap">
          <table class="ragic-table">
            <thead><tr id="ragicHeaderRow"></tr></thead>
            <tbody id="ragicTableBody"></tbody>
          </table>
        </div>
      </section>
      <section class="ragic-card" id="ragicFormView" aria-label="主表單視圖" hidden>
        <div class="ragic-form-toolbar"><h2></h2><button class="secondary" id="backToListButton" type="button">返回列表</button></div>
        <form id="ragicForm"></form>
        <div class="ragic-actions">
          <button class="ghost danger" id="deleteButton" type="button">刪除</button>
          <button class="primary" form="ragicForm" type="submit">儲存</button>
        </div>
      </section>
    </main>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../assets/firebase-init.js"></script>
  <script src="../assets/app.js"></script>
  <script src="../assets/ragic-table.js"></script>
  <script>
    initRagicPage({
      title: '日誌',
      collection: 'workLogs',
      fields: [
        { key: 'occurredAt', label: '發生時間', type: 'datetime' },
        { key: 'contactPerson', label: '接洽人員', type: 'text' },
        { key: 'customer', label: '客戶', type: 'text' },
        { key: 'category', label: '分類', type: 'text' },
        { key: 'status', label: '狀態', type: 'select', options: ['待處理', '處理中', '已完成', '暫緩'] },
        { key: 'serial', label: '編號', type: 'serial' },
        { key: 'completedAt', label: '完成時間', type: 'datetime' },
        { key: 'completedBy', label: '完成人員', type: 'text' },
        { key: 'updatedDate', label: '更新日期', type: 'updatedDate' },
        { key: 'image', label: '圖片', type: 'image' },
        { key: 'file', label: '檔案', type: 'file' },
        { key: 'reportLink', label: '提報連結', type: 'link' },
        { key: 'issueDescription', label: '問題描述', type: 'textarea', rows: 5 },
        { key: 'note', label: '備註', type: 'textarea', rows: 5 },
        { key: 'linkedReport', label: '連動提報', type: 'checkbox', defaultValue: false },
        { key: 'shift', label: '班別', type: 'text' },
        { key: 'department', label: '部門', type: 'text' },
        { key: 'items', label: '內容', type: 'subtable', fields: [
          { key: 'customer', label: '客戶', type: 'textarea', rows: 4 },
          { key: 'customerImage', label: '圖片', type: 'image' },
          { key: 'serviceTech', label: '客服／技術', type: 'textarea', rows: 4 },
          { key: 'serviceTechImage', label: '圖片', type: 'image' },
          { key: 'businessAm', label: '業務／AM', type: 'textarea', rows: 4 },
          { key: 'businessAmImage', label: '圖片', type: 'image' }
        ]}
      ],
      formLayout: {
        columns: 6,
        rows: 4,
        fields: {
          '發生時間': { row: 1, col: 1 },
          '接洽人員': { row: 1, col: 2 },
          '狀態': { row: 1, col: 3 },
          '分類': { row: 1, col: 4 },
          '客戶': { row: 1, col: 5 },
          '完成時間': { row: 2, col: 1 },
          '完成人員': { row: 2, col: 2 },
          '提報連結': { row: 2, col: 3 },
          '編號': { row: 2, col: 4 },
          '檔案': { row: 2, col: 5 },
          '問題描述': { row: 3, col: 1, colSpan: 2 },
          '備註': { row: 3, col: 3, colSpan: 2 },
          '圖片': { row: 3, col: 5 }
        }
      },
      listColumns: ['occurredAt', 'contactPerson', 'customer', 'category', 'status', 'serial', 'issueDescription', 'note', 'image', 'file', 'reportLink']
    });
  </script>
</body>
</html>
