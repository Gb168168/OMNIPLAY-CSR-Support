<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>交接｜OMNIPLAY 客服系統</title>
  <link rel="stylesheet" href="../assets/styles.css?v=20260718-12" />
  <link rel="manifest" href="/OMNIPLAY-CSR-Support/manifest.json" />
  <meta name="theme-color" content="#3B82F6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="../assets/icon-192.png" />
</head>
<body data-reminder-module="handover">
  <section class="app-shell" aria-label="客服系統主畫面">
    <aside id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>交接</h1>
          <p>客服班別交接事項。</p>
        </div>
        <div class="topbar-actions">
          <button class="secondary" id="designTableButton" type="button" hidden>⚙️ 設計表格</button>
          <div class="user-pill">● 已連線 Firebase</div>
        </div>
      </header>
      <section class="ragic-card" id="ragicListView" aria-label="列表視圖">
        <div class="ragic-toolbar">
          <div><h2 id="ragicTitle"></h2><p id="ragicSubtitle"></p></div>
          <button class="primary" id="newRecordButton" type="button">+ 新增</button>
        </div>
        <div class="ragic-table-wrap">
          <table class="ragic-table">
            <thead><tr id="ragicHeaderRow"></tr></thead>
            <tbody id="ragicTableBody"></tbody>
          </table>
        </div>
      </section>
      <section class="ragic-card" id="ragicFormView" aria-label="主表單視圖" hidden>
        <div class="ragic-form-toolbar"><h2></h2><button class="secondary" id="backToListButton" type="button">返回列表</button></div>
        <form id="ragicForm"></form>
        <div class="ragic-actions">
          <button class="ghost danger" id="deleteButton" type="button">刪除</button>
          <button class="primary" form="ragicForm" type="submit">儲存</button>
        </div>
      </section>
    </main>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../assets/firebase-init.js"></script>
  <script src="../assets/app.js?v=20260718-4"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-messaging-compat.js"></script>
  <script src="../assets/ragic-table.js?v=20260718-4"></script>
  <script src="../assets/reminders.js?v=20260718-1"></script>
  <script>
    initRagicPage({
      title: '交接',
      collection: 'workHandover',
      enforceConfigFields: true,
      fields: [
        { key: 'date', label: '日期', type: 'date', defaultToday: true, formRow: 1, formCol: 1 },
        { key: 'shift', label: '班別', type: 'select', options: ['早班', '晚班'], formRow: 1, formCol: 2 },
        { key: 'department', label: '部門', type: 'text', formRow: 1, formCol: 3 },
        { key: 'category', label: '分類', type: 'text', formRow: 1, formCol: 4 },
        { key: 'status', label: '狀態', type: 'select', options: ['已完成', '處理中', '必看⚠️'], formRow: 2, formCol: 2 },
        { key: 'item', label: '交接事項', type: 'textarea', rows: 5, formRow: 4, formCol: 1, formColSpan: 2 },
        { key: 'note', label: '備註', type: 'textarea', rows: 5, formRow: 4, formCol: 3, formColSpan: 2 },
        { key: 'publisher', label: '發佈者', type: 'text', formRow: 2, formCol: 1 },
        { key: 'finisher', label: '完成者', type: 'text', formRow: 2, formCol: 3 },
        { key: 'link', label: '連結', type: 'link', formRow: 3, formCol: 1 },
        { key: 'serial', label: '編號', type: 'serial', formRow: 3, formCol: 2 },
        { key: 'attachment', label: '檔案', type: 'file', formRow: 3, formCol: 3 },
        { key: 'image', label: '圖片', type: 'image', formRow: 2, formCol: 4, formRowSpan: 2 },
        { key: 'updated_time', label: '更新時間', type: 'updatedDate', formRow: 5, formCol: 1 },
        { key: 'reminder_at', label: '提醒時間', type: 'datetime', formRow: 5, formCol: 2 },
        { key: 'reminder_enabled', label: '啟用提醒', type: 'checkbox', defaultValue: true, formRow: 5, formCol: 3 }
      ],
      formLayout: [
        { label: '日期', formRow: 1, formCol: 1 },
        { label: '班別', formRow: 1, formCol: 2 },
        { label: '部門', formRow: 1, formCol: 3 },
        { label: '分類', formRow: 1, formCol: 4 },
        { label: '建立者', formRow: 2, formCol: 1 },
        { label: '發布者', formRow: 2, formCol: 1 },
        { label: '狀態', formRow: 2, formCol: 2 },
        { label: '完成者', formRow: 2, formCol: 3 },
        { label: '圖片', formRow: 2, formCol: 4, formRowSpan: 2 },
        { label: '圖片上傳', formRow: 2, formCol: 4, formRowSpan: 2 },
        { label: '連結', formRow: 3, formCol: 1 },
        { label: '編號', formRow: 3, formCol: 2 },
        { label: '檔案', formRow: 3, formCol: 3 },
        { label: '交接事項', formRow: 4, formCol: 1, formColSpan: 2 },
        { label: '備註', formRow: 4, formCol: 3, formColSpan: 2 },
        { label: '更新時間', formRow: 5, formCol: 1 },
        { label: '提醒時間', formRow: 5, formCol: 2 },
        { label: '啟用提醒', formRow: 5, formCol: 3 }
      ],
      listColumns: ['date', 'shift', 'department', 'category', 'status', 'item', 'note', 'publisher', 'finisher', 'image', 'attachment', 'updated_time', 'serial']
    });
  </script>
</body>
</html>
